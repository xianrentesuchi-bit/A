<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ようこそproxywikiへ</title>
    <style>
        /* ほんの少しだけUIを強化したスタイル */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 0 20px;
            color: #333;
            line-height: 1.6;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        ul { 
            list-style-type: none; 
            padding: 0; 
        }
        li { 
            margin-bottom: 12px; 
        }
        /* リンクをボタンのように押しやすく調整 */
        .btn-link {
            display: inline-block;
            padding: 10px 20px;
            background-color: #f4f4f4;
            color: #0066cc;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            border: 1px solid #ddd;
        }
        .btn-link:hover {
            background-color: #e9e9e9;
        }
    </style>
</head>
<body>

    <!-- 画面上のタイトル -->
    <h1>ようこそproxywikiへ</h1>
    
    <!-- メッセージ -->
    <p>欲しいサイトを選択してね</p>

    <!-- サイト選択リンク -->
    <ul>
        <li><a href="site/wkt.html" class="btn-link">wkt</a></li>
        <li><a href="site/sennin.html" class="btn-link">仙人tube</a></li>
    </ul>

</body>
</html>
