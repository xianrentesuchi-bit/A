<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>わかめtube & わかめtube plus</title>
    <style>
        /* 極限まで減らした最小限のスタイル（読みやすさのため最低限の余白のみ） */
        body { font-family: sans-serif; margin: 20px; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- 画面上のタイトル -->
    <h1>わかめtube & わかめtube plus</h1>

    <!-- 固定リンク -->
    <div>
        <a href="https://example.com/wakame-tube" target="_blank">わかめtube</a>
        | 
        <a href="https://example.com/wakame-tube-plus" target="_blank">わかめtube plus</a>
    </div>

    <hr>

    <!-- 状態表示用（読み込み中 / エラー） -->
    <div id="loading">読み込み中...</div>
    <div id="error" class="hidden" style="color: red;">データの読み込みに失敗しました。</div>

    <!-- URL一覧を表示する場所 -->
    <ul id="url-list"></ul>

    <script>
        // リポジトリ内のパスを指定
        const jsonUrl = 'urls/youtube/wkt.json';

        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const urlListEl = document.getElementById('url-list');

        // JSONファイルの読み込み
        fetch(jsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('ネットワークエラー');
                }
                return response.json();
            })
            .then(data => {
                // 読み込み中を非表示にする
                loadingEl.classList.add('hidden');

                // 配列データ、またはオブジェクト内の配列を想定してループ処理
                // ※jsonの構造が単純な配列、もしくは { "urls": [...] } などの場合に対応
                const urls = Array.isArray(data) ? data : (data.urls || Object.values(data).flat());

                if (!urls || urls.length === 0) {
                    errorEl.textContent = '表示するURLが見つかりませんでした。';
                    errorEl.classList.remove('hidden');
                    return;
                }

                // 一覧の生成
                urls.forEach(url => {
                    // 文字列かオブジェクトかを確認してURLを抽出
                    const targetUrl = typeof url === 'string' ? url : (url.url || url.link);
                    
                    if (targetUrl) {
                        const li = document.createElement('li');
                        const a = document.createElement('a');
                        a.href = targetUrl;
                        a.textContent = targetUrl;
                        a.target = '_blank'; // 新しいタブで開く
                        
                        li.appendChild(a);
                        urlListEl.appendChild(li);
                    }
                });
            })
            .catch(error => {
                console.error('エラー詳細:', error);
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
            });
    </script>

</body>
</html>
