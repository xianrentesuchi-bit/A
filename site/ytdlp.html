<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ytdlp稼働状況 - proxywiki</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            margin: 0;
            padding: 80px 20px 40px 20px;
            color: #333;
            line-height: 1.6;
            background-color: #f9fbfd;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 64px;
            background-color: #fff;
            box-shadow: 0 1px 3px rgba(60,64,67,0.1), 0 1px 2px rgba(60,64,67,0.06);
            z-index: 1000;
        }
        .logo {
            font-size: 1.25rem;
            font-weight: 500;
            color: #3c4043;
            text-decoration: none;
        }
        .menu-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5f6368;
            z-index: 1002;
            transition: background-color 0.2s;
        }
        .menu-btn:hover {
            background-color: #f1f3f4;
        }
        .side-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background-color: #fff;
            box-shadow: 0 16px 24px 2px rgba(0,0,0,0.14), 0 6px 30px 5px rgba(0,0,0,0.12), 0 8px 10px -7px rgba(0,0,0,0.2);
            transition: left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
            padding-top: 70px;
            box-sizing: border-box;
        }
        .side-menu ul {
            display: block;
            padding: 0 8px;
        }
        .side-menu li {
            margin-bottom: 4px;
        }
        .side-menu a {
            color: #3c4043;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: block;
            padding: 12px 24px;
            border-radius: 0 24px 24px 0;
            transition: background-color 0.2s;
        }
        .side-menu a:hover {
            background-color: #f1f3f4;
            color: #1a73e8;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
            z-index: 999;
        }
        #menu-bar:checked ~ .side-menu {
            left: 0;
        }
        #menu-bar:checked ~ .overlay {
            opacity: 1;
            visibility: visible;
        }
        #menu-bar {
            display: none;
        }
        h1 {
            font-size: 2.2rem;
            color: #202124;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 12px;
            border-bottom: 1px solid #dadce0;
            padding-bottom: 16px;
        }
        p {
            color: #5f6368;
            font-size: 1.05rem;
            margin-bottom: 16px;
        }
        .update-time {
            font-size: 0.9rem;
            color: #80868b;
            margin-bottom: 32px;
        }
        .status-table-container {
            background-color: #fff;
            border: 1px solid #dadce0;
            border-radius: 8px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 16px 24px;
            border-bottom: 1px solid #dadce0;
        }
        th {
            background-color: #f8f9fa;
            font-weight: 500;
            color: #3c4043;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .badge.active {
            background-color: #e6f4ea;
            color: #137333;
        }
        .badge.down {
            background-color: #fce8e6;
            color: #c5221f;
        }
        .badge.loading {
            background-color: #f1f3f4;
            color: #5f6368;
        }
    </style>
</head>
<body>

    <input type="checkbox" id="menu-bar">

    <header>
        <a href="home.html" class="logo">proxywiki</a>
        <label for="menu-bar" class="menu-btn">☰</label>
    </header>

    <nav class="side-menu">
        <ul>
            <li><a href="/">ホーム</a></li>
            <li><a href="list.html">サイト一覧</a></li>
            <li><a href="help.html">ヘルプ</a></li>
        </ul>
    </nav>

    <label for="menu-bar" class="overlay"></label>

    <div class="container">
        <h1>Ytdlp 稼働状況</h1>
        
        <p>各種APIサーバーの現在の稼働ステータスをリアルタイムに確認できます。</p>
        <div class="update-time" id="last-update">最終更新: 取得中...</div>

        <div class="status-table-container">
            <table>
                <thead>
                    <tr>
                        <th>API名</th>
                        <th>ステータス</th>
                    </tr>
                </thead>
                <tbody id="status-list">
                    <tr>
                        <td colspan="2" style="text-align: center; color: #5f6368;">データを読み込んでいます...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            const url = 'https://raw.githubusercontent.com/senninsugar/Ytdlp-check/refs/heads/main/all/all.json';
            const statusList = document.getElementById('status-list');
            const lastUpdate = document.getElementById('last-update');

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('ネットワークエラーが発生しました');
                
                const data = await response.json();
                
                lastUpdate.textContent = `最終更新: ${data.last_update}`;
                statusList.innerHTML = '';

                data.apis.forEach(api => {
                    const tr = document.createElement('tr');
                    
                    const tdName = document.createElement('td');
                    tdName.textContent = api.name;
                    tdName.style.fontWeight = '500';
                    
                    const tdStatus = document.createElement('td');
                    const spanStatus = document.createElement('span');
                    spanStatus.textContent = api.status;
                    
                    if (api.status === '稼働中') {
                        spanStatus.className = 'badge active';
                    } else if (api.status === 'ダウン中') {
                        spanStatus.className = 'badge down';
                    } else {
                        spanStatus.className = 'badge loading';
                    }
                    
                    tdStatus.appendChild(spanStatus);
                    tr.appendChild(tdName);
                    tr.appendChild(tdStatus);
                    statusList.appendChild(tr);
                });

            } catch (error) {
                statusList.innerHTML = `<tr><td colspan="2" style="text-align: center; color: #c5221f;">データの読み込みに失敗しました。</td></tr>`;
                lastUpdate.textContent = '最終更新: エラー';
            }
        }

        window.addEventListener('DOMContentLoaded', fetchStatus);
    </script>

</body>
</html>
