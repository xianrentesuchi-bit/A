<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>仙人tube plus</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>仙人tube plus</h1>

    <div>
        <a href="https://scratch.mit.edu/users/senninch/" target="_blank">仙人@sugar</a>
    </div>

    <hr>

    <div id="loading">読み込み中...</div>
    <div id="error" class="hidden" style="color: red;">データの読み込みに失敗しました。</div>

    <ul id="url-list"></ul>

    <script>
        const jsonUrl = '../urls/youtube/sennin.json';
        const primaryJsonUrl = 'https://raw.githubusercontent.com/xianrentesuchi-bit/A/refs/heads/main/urls/youtube/sennin.json';

        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const urlListEl = document.getElementById('url-list');

        fetch(primaryJsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('プライマリURLの読み込みエラー');
                }
                return response.json();
            })
            .catch(() => {
                return fetch(jsonUrl).then(response => {
                    if (!response.ok) {
                        throw new Error('ネットワークエラー');
                    }
                    return response.json();
                });
            })
            .then(data => {
                loadingEl.classList.add('hidden');

                const urls = Array.isArray(data) ? data : (data.urls || Object.values(data).flat());

                if (!urls || urls.length === 0) {
                    errorEl.textContent = '表示するURLが見つかりませんでした。';
                    errorEl.classList.remove('hidden');
                    return;
                }

                urls.forEach(url => {
                    const targetUrl = typeof url === 'string' ? url : (url.url || url.link);
                    
                    if (targetUrl) {
                        const li = document.createElement('li');
                        const a = document.createElement('a');
                        a.href = targetUrl;
                        a.textContent = targetUrl;
                        a.target = '_blank';
                        
                        li.appendChild(a);
                        urlListEl.appendChild(li);
                    }
                });
            })
            .catch(error => {
                console.error('エラー詳細:', error);
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
            });
    </script>

</body>
</html>
